<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Listener</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 40px auto; max-width: 500px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 24px; }
    h2 { margin-top: 0; }
    label { display: block; margin-top: 12px; }
    select { width: 100%; padding: 10px; font-size: 16px; margin-top: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 10px 16px; font-size: 15px; margin-top: 12px; cursor: pointer; border-radius: 6px; border: none; background: #0066cc; color: #fff; }
    pre { white-space: pre-wrap; background: #f7f7f7; padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🎧 Listener</h2>
    <label>Room <select id="room"></select></label>
    <button id="join">Join</button>
    <pre id="log"></pre>
  </div>
  <script type="module">
    import { Room } from "https://unpkg.com/livekit-client/dist/livekit-client.esm.mjs";

    const $ = id => document.getElementById(id);
    const log = m => ($("log").textContent += m + "\n");

    async function loadRooms() {
      const r = await fetch("/rooms");
      const data = await r.json();
      $("room").innerHTML = data.rooms.map(r => `<option>${r}</option>`).join("");
    }

    async function getToken(room) {
      const r = await fetch("/token?room=" + encodeURIComponent(room) + "&name=listener&role=listen");
      if (!r.ok) throw new Error("Token fetch failed: " + r.status);
      return await r.json();
    }

    $("join").onclick = async () => {
      try {
        $("join").disabled = true;
        const roomName = $("room").value;
        const data = await getToken(roomName);
        log("Got token, connecting to: " + data.livekitUrl);
        const conn = new Room();
        conn.on("trackSubscribed", track => {
          if (track.kind === "audio") {
            document.body.appendChild(track.attach());
            log("Audio subscribed.");
          }
        });
        await conn.connect(data.livekitUrl, data.token);
        log("Connected (listen-only): " + roomName);
      } catch (e) {
        log("ERROR: " + (e?.message || e));
        $("join").disabled = false;
      }
    };

    loadRooms();
  </script>
</body>
</html>
