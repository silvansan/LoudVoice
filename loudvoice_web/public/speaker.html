<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Speaker</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 40px auto; max-width: 500px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 24px; }
    h2 { margin-top: 0; }
    label { display: block; margin-top: 12px; }
    select, input { width: 100%; padding: 10px; font-size: 16px; margin-top: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 10px 16px; font-size: 15px; margin-top: 12px; cursor: pointer; border-radius: 6px; border: none; }
    #start { background: #0066cc; color: #fff; }
    #stop  { background: #cc3300; color: #fff; }
    pre { white-space: pre-wrap; background: #f7f7f7; padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🎙 Speaker</h2>
    <label>Room       <select id="room"></select></label>
    <label>Microphone <select id="mic"></select></label>
    <label>Name       <input  id="name" value="speaker" /></label>
    <button id="start">Start publishing</button>
    <button id="stop" disabled>Stop</button>
    <pre id="log"></pre>
  </div>
  <script type="module">
    import { Room, createLocalAudioTrack } from "https://unpkg.com/livekit-client/dist/livekit-client.esm.mjs";

    const $ = id => document.getElementById(id);
    const log = m => ($("log").textContent += m + "\n");
    let conn = null;

    async function loadRooms() {
      const r = await fetch("/rooms");
      const data = await r.json();
      $("room").innerHTML = data.rooms.map(r => `<option>${r}</option>`).join("");
    }

    async function listMics() {
      await navigator.mediaDevices.getUserMedia({ audio: true });
      const devices = await navigator.mediaDevices.enumerateDevices();
      const mics = devices.filter(d => d.kind === "audioinput");
      $("mic").innerHTML = mics.map(d =>
        `<option value="${d.deviceId}">${d.label || "Mic " + d.deviceId.slice(0, 6)}</option>`
      ).join("");
      if (!mics.length) log("No microphones found.");
    }

    async function getToken(room, name, role) {
      const r = await fetch("/token?room=" + encodeURIComponent(room) + "&name=" + encodeURIComponent(name) + "&role=" + encodeURIComponent(role));
      if (!r.ok) throw new Error("Token fetch failed: " + r.status);
      return await r.json();
    }

    $("start").onclick = async () => {
      try {
        $("start").disabled = true;
        const data = await getToken($("room").value, $("name").value || "speaker", "speak");
        log("Got token, connecting to: " + data.livekitUrl);
        conn = new Room();
        await conn.connect(data.livekitUrl, data.token);
        log("Connected: " + $("room").value);
        const track = await createLocalAudioTrack({ deviceId: { exact: $("mic").value } });
        await conn.localParticipant.publishTrack(track);
        log("Publishing audio…");
        $("stop").disabled = false;
      } catch (e) {
        log("ERROR: " + (e?.message || e));
        $("start").disabled = false;
      }
    };

    $("stop").onclick = async () => {
      $("stop").disabled = true;
      if (conn) await conn.disconnect();
      conn = null;
      log("Disconnected.");
      $("start").disabled = false;
    };

    loadRooms();
    listMics().catch(err => log("Mic error: " + err));
  </script>
</body>
</html>
