name: undersound

services:
  redis:
    image: redis:7-alpine
    container_name: livekit-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    networks:
      - livekit-net

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        redis:
          address: redis:6379
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "50000-50100:50000-50100/udp"
    networks:
      - livekit-net

  undersound-web:
    image: node:20-alpine
    container_name: undersound-web
    restart: unless-stopped
    depends_on:
      - livekit
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      PUBLIC_LIVEKIT_WSS: ${PUBLIC_LIVEKIT_WSS}
      LOCAL_LIVEKIT_WSS: ${LOCAL_LIVEKIT_WSS}
      INTERNAL_LIVEKIT_URL: http://livekit:7880
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LINK_BASE_URL: ${LINK_BASE_URL:-}
      DATA_PATH: ${DATA_PATH:-/app/data/app-data.json}
      UPLOAD_ROOT: ${UPLOAD_ROOT:-/app/uploads}
    ports:
      - "7884:8080/tcp"
    volumes:
      - ./undersound_web:/app
    working_dir: /app
    command: sh -c "npm i --omit=dev && node server.mjs"
    networks:
      - livekit-net

  livekit-egress:
    image: livekit/egress:latest
    container_name: livekit-egress
    restart: unless-stopped
    depends_on:
      - livekit
      - redis
    cap_add:
      - SYS_ADMIN
    environment:
      EGRESS_CONFIG_BODY: |
        log_level: info
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        insecure: true
        redis:
          address: redis:6379
    volumes:
      - ./undersound_web/public/hls:/out
    working_dir: /out
    networks:
      - livekit-net

networks:
  livekit-net:
    driver: bridge
