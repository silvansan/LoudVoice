<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Speaker - UnderSound</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <main class="shell public-shell">
    <header class="brand event-brand">
      <img id="logo" class="logo event-logo" src="/logo.svg" alt="Event logo" />
      <p class="eyebrow">Speaker</p>
      <h1 id="eventName">UnderSound</h1>
      <p id="description"></p>
    </header>

    <section class="card" id="tokenPrompt">
      <h2>Speaker token</h2>
      <label>Token
        <input id="tokenInput" type="text" autocomplete="off" />
      </label>
      <div class="toolbar">
        <button id="tokenSubmit">Load speaker page</button>
      </div>
      <pre id="tokenStatus" class="status"></pre>
    </section>

    <section class="card player-card hidden" id="playerCard">
      <div class="room-top">
        <div>
          <span class="section-label">Channel</span>
          <h2 id="channelName">Loading...</h2>
        </div>
        <span id="hlsStatus" class="status-pill">HLS auto</span>
      </div>

      <label>Microphone <select id="mic"></select></label>
      <label>Name <input id="name" value="speaker" autocomplete="name" /></label>

      <div class="toolbar">
        <button id="start">Start Publishing</button>
        <button id="stop" class="danger" disabled>Stop</button>
      </div>
      <pre id="log"></pre>
    </section>
  </main>

  <script type="module">
    import { Room, createLocalAudioTrack } from "https://unpkg.com/livekit-client/dist/livekit-client.esm.mjs";

    const $ = id => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    let token = params.get("token") || "";
    const [, , eventSlug, channelName] = location.pathname.split("/").map(decodeURIComponent);
    let channel = null;
    let room = null;
    let track = null;

    function log(message) {
      $("log").textContent += message + "\n";
      $("log").scrollTop = $("log").scrollHeight;
    }

    async function api(path, options = {}) {
      const response = await fetch(path, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || "Request failed: " + response.status);
      return data;
    }

    function showTokenPrompt(message) {
      $("tokenPrompt").classList.remove("hidden");
      $("playerCard").classList.add("hidden");
      $("tokenInput").value = token;
      $("tokenStatus").textContent = message || "";
      $("tokenStatus").classList.toggle("error", Boolean(message));
    }

    function hideTokenPrompt() {
      $("tokenPrompt").classList.add("hidden");
      $("tokenStatus").textContent = "";
    }

    function updateUrlToken(value) {
      token = value;
      const url = new URL(location.href);
      url.searchParams.set("token", token);
      history.replaceState(null, "", url.href);
    }

    async function loadChannel() {
      const url = new URL("/api/public/channel", location.origin);
      url.searchParams.set("event", eventSlug);
      url.searchParams.set("channel", channelName);
      url.searchParams.set("role", "speaker");
      url.searchParams.set("token", token);
      const data = await api(url);
      channel = data.channel;
      $("logo").src = data.logoUrl || "/logo.svg";
      $("eventName").textContent = data.event.name || "UnderSound";
      $("description").textContent = data.event.publicDescription || data.event.location || "";
      $("channelName").textContent = channel.name;
      document.title = channel.name + " Speaker - " + data.event.name;
      hideTokenPrompt();
      $("playerCard").classList.remove("hidden");
    }

    async function listMics() {
      await navigator.mediaDevices.getUserMedia({ audio: true });
      const devices = await navigator.mediaDevices.enumerateDevices();
      const mics = devices.filter(device => device.kind === "audioinput");
      $("mic").replaceChildren(...mics.map(device => {
        const option = document.createElement("option");
        option.value = device.deviceId;
        option.textContent = device.label || "Microphone";
        return option;
      }));
      if (!mics.length) log("No microphones found.");
    }

    async function livekitToken() {
      const url = new URL("/api/livekit/token", location.origin);
      url.searchParams.set("channelId", channel.id);
      url.searchParams.set("role", "speaker");
      url.searchParams.set("token", token);
      return await api(url);
    }

    async function startHls() {
      const url = new URL("/api/channels/" + encodeURIComponent(channel.id) + "/speaker-session/start", location.origin);
      url.searchParams.set("token", token);
      const data = await api(url, { method: "POST" });
      $("hlsStatus").classList.add("active");
      $("hlsStatus").textContent = "HLS On";
      return data.hls;
    }

    $("start").addEventListener("click", async () => {
      try {
        $("start").disabled = true;
        const identity = $("name").value.trim() || "speaker";
        const data = await livekitToken();
        log("Connecting to " + data.livekitUrl);
        room = new Room();
        await room.connect(data.livekitUrl, data.token);
        const micId = $("mic").value;
        track = await createLocalAudioTrack(micId ? { deviceId: { exact: micId } } : {});
        await room.localParticipant.publishTrack(track);
        log(identity + " is publishing in " + channel.name + ".");
        await startHls();
        log("HLS started for listener phones.");
        $("stop").disabled = false;
      } catch (error) {
        log("ERROR: " + (error?.message || error));
        $("start").disabled = false;
      }
    });

    $("stop").addEventListener("click", async () => {
      $("stop").disabled = true;
      if (track) track.stop();
      if (room) await room.disconnect();
      track = null;
      room = null;
      log("Disconnected.");
      $("start").disabled = false;
    });

    window.addEventListener("beforeunload", () => {
      if (track) track.stop();
      if (room) room.disconnect();
    });

    $("tokenSubmit").addEventListener("click", async () => {
      const value = $("tokenInput").value.trim();
      if (!value) {
        showTokenPrompt("Token is required.");
        return;
      }
      updateUrlToken(value);
      try {
        await loadChannel();
        await listMics();
      } catch (error) {
        showTokenPrompt("Invalid or expired speaker token. Enter a valid token.");
        log("ERROR: " + (error?.message || error));
      }
    });

    if (!token) {
      showTokenPrompt("Enter your speaker token to continue.");
    } else {
      loadChannel()
        .then(listMics)
        .catch(error => {
          showTokenPrompt("Invalid or expired speaker token. Enter a valid token.");
          log("ERROR: " + (error?.message || error));
        });
    }
  </script>
</body>
</html>
